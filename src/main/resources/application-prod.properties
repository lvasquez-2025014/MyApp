# Perfil de produccion para Railway con MySQL
spring.application.name=kinalapp
server.port=${PORT:8302}

# Railway inyecta MYSQL_URL, MYSQL_USER, MYSQL_PASSWORD automaticamente
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/kinalapp?createDatabaseIfNotExist=true}
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:password}

#JPA / Hibernate - MySQL
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
