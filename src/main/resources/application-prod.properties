# Perfil de produccion para Render
spring.application.name=kinalapp
server.port=${PORT:8302}

#Conexion a PostgreSQL - Render proporciona la URL completa
spring.datasource.url=${SPRING_DATASOURCE_URL:${DATABASE_URL:jdbc:postgresql://localhost:5432/kinalapp}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DATABASE_USER:postgres}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DATABASE_PASSWORD:postgres}}

#JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Evitar que falle si la DB no esta lista
spring.datasource.continue-on-error=true
spring.sql.init.mode=never
