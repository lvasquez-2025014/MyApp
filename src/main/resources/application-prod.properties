# Perfil de produccion para Render
spring.application.name=kinalapp
server.port=${PORT:8302}

# Render inyecta DATABASE_URL automaticamente al vincular la BD
# Formato: postgresql://user:pass@host:5432/dbname
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/kinalapp}

# Si DATABASE_URL no tiene el formato jdbc://, usar componentes individuales
spring.datasource.username=${DATABASE_USER:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}

#JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.sql.init.mode=never
