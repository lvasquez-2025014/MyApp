spring.application.name=kinalapp
server.port=${PORT:8302}

#Conexion a MySQL (Render usa DATABASE_URL)
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/kinalapp?createDatabaseIfNotExist=true}
spring.datasource.username=${DATABASE_USER:root}
spring.datasource.password=${DATABASE_PASSWORD:password}

#JPA / Hibernate - Dialecto MySQL
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
