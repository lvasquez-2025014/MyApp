<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KinalApp | Iniciar Sesión</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/autenticacion.css}">
</head>
<body>
  <!-- Fondo animado -->
  <div class="bg-layer">
    <div class="bg-gradient"></div>
    <div class="noise"></div>
    <div class="grid"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="particles">
      <div class="particle"></div><div class="particle"></div><div class="particle"></div>
      <div class="particle"></div><div class="particle"></div><div class="particle"></div>
      <div class="particle"></div><div class="particle"></div><div class="particle"></div>
      <div class="particle"></div>
    </div>
    <div class="deco-rings">
      <div class="ring ring-1"></div>
      <div class="ring ring-2"></div>
      <div class="ring ring-3"></div>
    </div>
  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toastContainer">
    <!-- Toast de Registro Exitoso -->
    <div th:if="${toastExito}" class="toast toast-success" id="toastExito">
      <div class="toast-icon">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
      </div>
      <div class="toast-content">
        <h4>¡FELICIDADES!</h4>
        <p th:text="${toastExito}">Te has registrado exitosamente</p>
      </div>
    </div>
  </div>
  <div class="confetti-container" id="confettiContainer"></div>

  <!-- Card principal -->
  <main class="auth-wrapper">
    <section class="form-card">
      <div class="card-border"></div>
      <div class="card-highlight"></div>
      <div class="card-reflection"></div>
      
      <!-- Header -->
      <header class="brand-panel">
        <div class="brand-row">
          <div class="brand-icon-wrap">
            <div class="brand-icon" style="padding: 4px; background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);">
              <img th:src="@{/img/logo.png}" alt="Kinal Logo" style="width: 100%; height: 100%; object-fit: contain; border-radius: 8px;">
            </div>
          </div>
          <div class="brand-text">
            <h1 class="brand-name">Kinal</h1>
            <p class="brand-tag">Portal de acceso seguro</p>
          </div>
          <div class="status-badge">
            <span class="status-dot"></span>
            En línea
          </div>
        </div>
      </header>

      <!-- Toggle de navegación -->
      <nav class="toggle-nav">
        <label class="toggle-label active">Iniciar Sesión</label>
        <a th:href="@{/registro}" class="toggle-label" style="text-decoration: none; color: var(--text-muted);">Crear Cuenta</a>
        <div class="toggle-thumb" style="transform: translateX(0);"></div>
      </nav>

      <!-- Contenido -->
      <div style="padding: 0 36px 36px;">
        <div class="panel-header" style="margin-bottom: 24px;">
          <h2 class="panel-title">Bienvenido de nuevo</h2>
          <p class="panel-desc">Ingresa tus credenciales para acceder a tu espacio personal.</p>
        </div>

        <!-- Mensajes Thymeleaf -->
        <div th:if="${mensaje}" class="alert-message success" th:text="${mensaje}" style="padding: 12px 16px; border-radius: var(--radius-md); font-size: 0.85rem; margin-bottom: 20px; text-align: center; background: rgba(34, 197, 94, 0.1); border: 1px solid rgba(34, 197, 94, 0.2); color: var(--success);"></div>
        <div th:if="${error}" class="alert-message error" th:text="${error}" style="padding: 12px 16px; border-radius: var(--radius-md); font-size: 0.85rem; margin-bottom: 20px; text-align: center; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); color: var(--error);"></div>
        
        <form method="post" th:action="@{/login}" id="loginForm">
          <div class="input-wrap">
            <input type="text" name="username" id="login-user" class="input-field" placeholder=" " required minlength="3">
            <label for="login-user" class="input-label">Usuario</label>
            <span class="input-icon">
              <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </span>
            <span class="state-dot"></span>
            <span class="input-underline"></span>
          </div>

          <div class="input-wrap">
            <input type="password" name="password" id="login-pass" class="input-field" placeholder=" " required minlength="3">
            <label for="login-pass" class="input-label">Contraseña</label>
            <span class="input-icon">
              <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            </span>
            <span class="state-dot"></span>
            <span class="input-underline"></span>
          </div>

          <div class="row-between" style="margin: -6px 0 18px;">
            <label class="check-row" style="margin: 0;">
              <input type="checkbox" name="remember">
              <span class="check-box"></span>
              <span class="check-label">Recordarme</span>
            </label>
            <a href="#" class="link-sm">¿Olvidaste tu contraseña?</a>
          </div>

          <button type="submit" class="btn-main">
            <span class="btn-text">Acceder al portal</span>
            <div class="btn-spinner"><div class="spinner"></div></div>
          </button>
        </form>

        <div class="divider">
          <span class="divider-text">O continúa con</span>
        </div>

        <div class="social-grid">
          <button type="button" class="btn-social">
            <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Google
          </button>
          <button type="button" class="btn-social">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/></svg>
            GitHub
          </button>
        </div>

        <p class="panel-footer" style="margin-top: 24px;">
          ¿No tienes cuenta? <a th:href="@{/registro}">Regístrate aquí</a>
        </p>
      </div>
    </section>
  </main>

</body>
</html>
