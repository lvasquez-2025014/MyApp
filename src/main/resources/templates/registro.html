<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KinalApp | Crear Cuenta</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/autenticacion.css}">
</head>
<body>
  <!-- Fondo -->
  <div class="bg-layer">
    <div class="bg-gradient"></div>
    <div class="noise"></div>
    <div class="grid"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="deco-rings">
      <div class="ring ring-1"></div>
      <div class="ring ring-2"></div>
      <div class="ring ring-3"></div>
    </div>
  </div>

  <!-- Card principal -->
  <main class="auth-wrapper">
    <section class="form-card">
      <div class="card-border"></div>
      <div class="card-highlight"></div>
      
      <!-- Header -->
      <header class="brand-panel">
        <div class="brand-row">
          <div class="brand-icon-wrap">
            <div class="brand-icon" style="padding: 4px; background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);">
              <img th:src="@{/img/logo.png}" alt="Kinal Logo" style="width: 100%; height: 100%; object-fit: contain; border-radius: 8px;">
            </div>
          </div>
          <div class="brand-text">
            <h1 class="brand-name">Kinal</h1>
            <p class="brand-tag">Portal de acceso seguro</p>
          </div>
          <div class="status-badge">
            <span class="status-dot"></span>
            En línea
          </div>
        </div>
      </header>

      <!-- Toggle de navegación -->
      <nav class="toggle-nav">
        <a th:href="@{/login}" class="toggle-label" style="text-decoration: none; color: var(--text-muted);">Iniciar Sesión</a>
        <label class="toggle-label active" style="color: #ffffff;">Crear Cuenta</label>
        <div class="toggle-thumb" style="transform: translateX(calc(100% + 8px));"></div>
      </nav>

      <!-- Contenido -->
      <div class="panels-wrap" style="min-height: 420px; position: relative; padding: 0 48px 36px;">
        <!-- Mensajes Thymeleaf -->
        <div th:if="${error}" class="alert-message error" th:text="${error}" style="padding: 12px 16px; border-radius: var(--radius-md); font-size: 0.85rem; margin-bottom: 20px; text-align: center; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); color: var(--error);"></div>
        
        <form method="post" th:action="@{/registro}" id="registroForm">
          <div class="panel active" style="padding: 0; opacity: 1; visibility: visible; filter: none; transform: none; position: static;">
            <div class="panel-header" style="margin-bottom: 20px;">
              <h2 class="panel-title">Crear Cuenta</h2>
              <p class="panel-desc">Completa tus datos para registrarte.</p>
            </div>

            <div class="input-wrap" style="margin-bottom: 12px;">
              <input type="text" name="username" class="input-field" placeholder=" " required minlength="3" pattern="[A-Za-z\s]{3,50}" title="Solo letras y espacios, mínimo 3 caracteres">
              <label class="input-label">Nombre completo</label>
              <span class="input-icon">
                <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              </span>
              <span class="state-dot"></span>
              <span class="input-underline"></span>
            </div>

            <div class="input-wrap" style="margin-bottom: 12px;">
              <input type="email" name="email" class="input-field" placeholder=" " required pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$">
              <label class="input-label">Correo electrónico</label>
              <span class="input-icon">
                <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
              </span>
              <span class="state-dot"></span>
              <span class="input-underline"></span>
            </div>

            <div class="input-wrap" style="margin-bottom: 12px;">
              <input type="password" name="password" class="input-field" placeholder=" " required minlength="8">
              <label class="input-label">Contraseña</label>
              <span class="input-icon">
                <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
              </span>
              <span class="state-dot"></span>
              <span class="input-underline"></span>
            </div>

            <label class="check-row" style="margin: 12px 0 20px; padding: 4px 0;">
              <input type="checkbox" name="terms" required>
              <span class="check-box"></span>
              <span class="check-label">Acepto los <a href="#">Términos de servicio</a> y la <a href="#">Política de privacidad</a>.</span>
            </label>

            <button type="submit" class="btn-main" style="margin-bottom: 8px;">
              <span class="btn-text">Crear mi cuenta</span>
            </button>

            <p class="panel-footer" style="margin-top: 8px;">
              ¿Ya tienes cuenta? <a th:href="@{/login}">Inicia sesión</a>
            </p>
          </div>
        </form>
      </div>
    </section>
  </main>

</body>
</html>
